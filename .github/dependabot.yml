version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: saturday
    groups:
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
      devDependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5
    reviewers:
      - perkola
